<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RagAI</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #09090b;
        color: #f4f4f5;
      }

      main {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 32px 20px;
      }

      .page {
        width: 100%;
        max-width: 980px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid #27272a;
        background: #18181b;
        color: #a1a1aa;
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 14px;
        margin-bottom: 18px;
      }

      h1 {
        font-size: clamp(42px, 7vw, 80px);
        line-height: 0.95;
        margin: 0 0 18px;
        letter-spacing: -0.06em;
      }

      .intro {
        color: #a1a1aa;
        font-size: 18px;
        line-height: 1.7;
        max-width: 720px;
        margin: 0 0 28px;
      }

      .card {
        border: 1px solid #27272a;
        background: rgba(24, 24, 27, 0.75);
        border-radius: 24px;
        padding: 22px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      }

      .chat {
        min-height: 420px;
        max-height: 58vh;
        overflow-y: auto;
        border: 1px solid #27272a;
        background: #09090b;
        border-radius: 18px;
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .message {
        max-width: 82%;
        border-radius: 18px;
        padding: 14px 16px;
        line-height: 1.7;
        white-space: pre-wrap;
      }

      .message.user {
        align-self: flex-end;
        background: #f4f4f5;
        color: #09090b;
      }

      .message.ai {
        align-self: flex-start;
        background: #18181b;
        color: #d4d4d8;
        border: 1px solid #27272a;
      }

      .message.empty {
        align-self: center;
        color: #71717a;
        background: transparent;
        border: 1px dashed #27272a;
      }

      .typing {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #a1a1aa;
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: #a1a1aa;
        animation: pulse 0.9s infinite ease-in-out;
      }

      .dot:nth-child(2) {
        animation-delay: 0.15s;
      }

      .dot:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.25; transform: translateY(0); }
        50% { opacity: 1; transform: translateY(-2px); }
      }

      form {
        margin-top: 18px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
      }

      textarea {
        width: 100%;
        min-height: 58px;
        max-height: 160px;
        resize: vertical;
        border: 1px solid #27272a;
        background: #09090b;
        color: #f4f4f5;
        border-radius: 18px;
        padding: 14px 16px;
        font: inherit;
        font-size: 16px;
        line-height: 1.5;
        outline: none;
      }

      textarea:focus {
        border-color: #71717a;
      }

      button {
        border: 0;
        border-radius: 16px;
        padding: 0 20px;
        min-height: 58px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      #sendBtn {
        background: #f4f4f5;
        color: #09090b;
      }

      #clearBtn {
        margin-top: 12px;
        min-height: auto;
        padding: 11px 14px;
        background: transparent;
        color: #d4d4d8;
        border: 1px solid #27272a;
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .hint {
        color: #71717a;
        font-size: 13px;
        margin-top: 10px;
      }

      @media (max-width: 700px) {
        form {
          grid-template-columns: 1fr;
        }

        .message {
          max-width: 95%;
        }
      }
    </style>
  </head>

  <body>
    <main>
      <section class="page">
        <div class="badge">✦ RagAI</div>

        <h1>RagAI</h1>

        <p class="intro">
          Ask a question and receive a roast-wrapped Wikipedia answer.
        </p>

        <section class="card">
          <div id="chat" class="chat">
            <div class="message empty">Start a conversation.</div>
          </div>

          <form id="promptForm">
            <textarea id="promptInput" placeholder="Message RagAI..."></textarea>
            <button id="sendBtn" type="submit">Send</button>
          </form>

          <button id="clearBtn" type="button">Clear chat</button>
          <p class="hint">Press Ctrl/⌘ + Enter to send.</p>
        </section>
      </section>
    </main>

    <script type="module">
      import {
        openers,
        escalations,
        finishers,
        randomItem,
      } from "./meme-ai-roast-pools.js";
      import { searchWikipedia } from "./wiki-search.js";

      const chat = document.querySelector("#chat");
      const form = document.querySelector("#promptForm");
      const promptInput = document.querySelector("#promptInput");
      const sendBtn = document.querySelector("#sendBtn");
      const clearBtn = document.querySelector("#clearBtn");

      let isGenerating = false;
      let messages = [];

      function randomDelay(min = 1600, max = 4200) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function wait(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      async function typeText(message, text) {
        const characters = text.split("");

        for (const character of characters) {
          message.content += character;
          renderMessages();
          await wait(Math.floor(Math.random() * 28) + 12);
        }
      }

      function scrollToBottom() {
        chat.scrollTop = chat.scrollHeight;
      }

      function renderMessages() {
        chat.innerHTML = "";

        if (messages.length === 0) {
          const empty = document.createElement("div");
          empty.className = "message empty";
          empty.textContent = "Start a conversation.";
          chat.appendChild(empty);
          return;
        }

        for (const message of messages) {
          const bubble = document.createElement("div");
          bubble.className = `message ${message.role}`;
          bubble.textContent = message.content;
          chat.appendChild(bubble);
        }

        scrollToBottom();
      }

      function renderThinking() {
        const bubble = document.createElement("div");
        bubble.className = "message ai";
        bubble.id = "thinkingMessage";
        bubble.innerHTML = `
          <span class="typing">
            Analyzing
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </span>
        `;
        chat.appendChild(bubble);
        scrollToBottom();
        return bubble;
      }

      function formatWikipediaPart(article) {
        return `Wikipedia has already done the part where facts are collected, so here is the actual answer from "${article.title}":\n\n${article.extract}\n\nSource: ${article.url}`;
      }

      async function typePart(aiMessage, part) {
        const thinkingBubble = renderThinking();
        await wait(randomDelay());
        thinkingBubble.remove();

        if (aiMessage.content) {
          await typeText(aiMessage, "\n\n");
        }

        await typeText(aiMessage, part);
      }

      async function generateResponse(prompt) {
        const aiMessage = { role: "ai", content: "" };
        messages.push(aiMessage);
        renderMessages();

        await typePart(aiMessage, randomItem(openers));
        await typePart(aiMessage, randomItem(escalations));

        try {
          const article = await searchWikipedia(prompt);
          await typePart(aiMessage, formatWikipediaPart(article));
        } catch (error) {
          await typePart(
            aiMessage,
            "Wikipedia was contacted, but the request failed. This is usually a network, CORS, or rate-limit problem. The roast pipeline remains tragically operational."
          );
        }

        await typePart(aiMessage, randomItem(finishers));
      }

      async function handleSend() {
        const prompt = promptInput.value.trim();

        if (!prompt || isGenerating) return;

        isGenerating = true;
        sendBtn.disabled = true;
        sendBtn.textContent = "Sending";

        messages.push({ role: "user", content: prompt });
        promptInput.value = "";
        renderMessages();

        await generateResponse(prompt);

        isGenerating = false;
        sendBtn.disabled = false;
        sendBtn.textContent = "Send";
        promptInput.focus();
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        handleSend();
      });

      promptInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) {
          event.preventDefault();
          handleSend();
        }
      });

      clearBtn.addEventListener("click", () => {
        if (isGenerating) return;
        messages = [];
        renderMessages();
      });
    </script>
  </body>
</html>
