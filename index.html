<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RagAI</title>
    <style>
      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(82, 82, 91, 0.24), transparent 36rem),
          radial-gradient(circle at bottom right, rgba(63, 63, 70, 0.2), transparent 34rem),
          #09090b;
        color: #f4f4f5;
      }

      main {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding: 32px 20px;
      }

      .page { width: 100%; max-width: 980px; }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        border: 1px solid #27272a;
        background: #18181b;
        color: #a1a1aa;
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 14px;
        margin-bottom: 18px;
      }

      h1 {
        font-size: clamp(42px, 7vw, 80px);
        line-height: 0.95;
        margin: 0 0 18px;
        letter-spacing: -0.06em;
      }

      .intro {
        color: #a1a1aa;
        font-size: 18px;
        line-height: 1.7;
        max-width: 720px;
        margin: 0 0 28px;
      }

      .card {
        border: 1px solid #27272a;
        background: rgba(24, 24, 27, 0.75);
        border-radius: 24px;
        padding: 22px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(16px);
      }

      .chat {
        min-height: 420px;
        max-height: 58vh;
        overflow-y: auto;
        border: 1px solid #27272a;
        background: #09090b;
        border-radius: 18px;
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .message {
        max-width: 82%;
        border-radius: 18px;
        padding: 14px 16px;
        line-height: 1.7;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .message.user {
        align-self: flex-end;
        background: #f4f4f5;
        color: #09090b;
      }

      .message.ai {
        align-self: flex-start;
        background: #18181b;
        color: #d4d4d8;
        border: 1px solid #27272a;
      }

      .message.empty {
        align-self: center;
        color: #71717a;
        background: transparent;
        border: 1px dashed #27272a;
      }

      .message a {
        color: #f4f4f5;
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      .typing {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: #a1a1aa;
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: #a1a1aa;
        animation: pulse 0.9s infinite ease-in-out;
      }

      .dot:nth-child(2) { animation-delay: 0.15s; }
      .dot:nth-child(3) { animation-delay: 0.3s; }

      @keyframes pulse {
        0%, 100% { opacity: 0.25; transform: translateY(0); }
        50% { opacity: 1; transform: translateY(-2px); }
      }

      .search-card {
        border: 1px solid #3f3f46;
        background: #111113;
        border-radius: 16px;
        padding: 14px;
        margin-top: 12px;
      }

      .search-title {
        font-weight: 700;
        color: #f4f4f5;
        margin-bottom: 6px;
      }

      .search-url {
        color: #a1a1aa;
        font-size: 13px;
        margin-bottom: 10px;
      }

      .search-snippet {
        color: #d4d4d8;
      }

      form {
        margin-top: 18px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
      }

      textarea {
        width: 100%;
        min-height: 58px;
        max-height: 160px;
        resize: vertical;
        border: 1px solid #27272a;
        background: #09090b;
        color: #f4f4f5;
        border-radius: 18px;
        padding: 14px 16px;
        font: inherit;
        font-size: 16px;
        line-height: 1.5;
        outline: none;
      }

      textarea:focus { border-color: #71717a; }

      button {
        border: 0;
        border-radius: 16px;
        padding: 0 20px;
        min-height: 58px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      #sendBtn {
        background: #f4f4f5;
        color: #09090b;
      }

      #clearBtn {
        margin-top: 12px;
        min-height: auto;
        padding: 11px 14px;
        background: transparent;
        color: #d4d4d8;
        border: 1px solid #27272a;
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .hint {
        color: #71717a;
        font-size: 13px;
        margin-top: 10px;
      }

      @media (max-width: 700px) {
        form { grid-template-columns: 1fr; }
        .message { max-width: 95%; }
      }
    </style>
  </head>

    <main>

        <h1>RagAI</h1>

        <p class="intro">

        </p>

        <section class="card">
          <div id="chat" class="chat">

          </div>

          <form id="promptForm">
            <textarea id="promptInput" placeholder="Message RagAI..."></textarea>
            <button id="sendBtn" type="submit">Send</button>
          </form>

          <button id="clearBtn" type="button">Clear chat</button>
          <p class="hint">Press Ctrl/⌘ + Enter to send.</p>
        </section>
      </section>
    </main>

      const chat = document.querySelector("#chat");
      const form = document.querySelector("#promptForm");
      const promptInput = document.querySelector("#promptInput");
      const sendBtn = document.querySelector("#sendBtn");
      const clearBtn = document.querySelector("#clearBtn");

      let isGenerating = false;
      let messages = [];

      function randomItem(items) {
        return items[Math.floor(Math.random() * items.length)];
      }

      function randomDelay(min = 900, max = 2100) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function wait(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      function escapeHTML(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function scrollToBottom() {
        chat.scrollTop = chat.scrollHeight;
      }

      function renderMessages() {
        chat.innerHTML = "";

        if (messages.length === 0) {
          const empty = document.createElement("div");
          empty.className = "message empty";
          empty.textContent = "Start a conversation.";
          chat.appendChild(empty);
          return;
        }

        for (const message of messages) {
          const bubble = document.createElement("div");
          bubble.className = `message ${message.role}`;

          if (message.html) {
            bubble.innerHTML = message.content;
          } else {
            bubble.textContent = message.content;
          }

          chat.appendChild(bubble);
        }

        scrollToBottom();
      }

      function renderThinking(label = "Thinking") {
        const bubble = document.createElement("div");
        bubble.className = "message ai";
        bubble.innerHTML = `
          <span class="typing">
            ${escapeHTML(label)}
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </span>
        `;
        chat.appendChild(bubble);
        scrollToBottom();
        return bubble;
      }

      async function typeText(message, text) {
        const characters = String(text).split("");

        for (const character of characters) {
          message.content += character;
          renderMessages();
          await wait(Math.floor(Math.random() * 14) + 6);
        }
      }

      async function typeHTML(message, htmlString) {
        message.html = true;
        message.content = htmlString;
        renderMessages();
      }

      function normalizePromptForWiki(prompt) {
        return prompt
          .replace(/[?!.]/g, "")
          .replace(/\b(who|what|when|where|why|how|is|are|was|were|do|does|did|can|could|should|would|the|a|an)\b/gi, " ")
          .replace(/\s+/g, " ")
          .trim() || prompt.trim();
      }

      async function findWikipediaArticle(prompt) {
        const query = normalizePromptForWiki(prompt);
        const searchURL = `https://en.wikipedia.org/w/api.php?action=query&origin=*&list=search&srsearch=${encodeURIComponent(query)}&utf8=&format=json&srlimit=1`;

        const searchResponse = await fetch(searchURL);
        const searchData = await searchResponse.json();
        const firstResult = searchData?.query?.search?.[0];

        if (!firstResult) {
          return null;
        }

        const title = firstResult.title;
        const summaryURL = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`;
        const summaryResponse = await fetch(summaryURL);

        if (!summaryResponse.ok) {
          return null;
        }

        const summaryData = await summaryResponse.json();

        return {
          title: summaryData.title || title,
          extract: summaryData.extract || firstResult.snippet?.replace(/<[^>]*>/g, "") || "Wikipedia had something, but apparently even the extract gave up.",
          url: summaryData.content_urls?.desktop?.page || `https://en.wikipedia.org/wiki/${encodeURIComponent(title)}`
        };
      }

      function formatWikipediaPart(article) {
        const intro = randomItem(wikipediaIntroResponses);

        if (!article) {
          return `${intro}\n\nNo clean Wikipedia result appeared, which is almost impressive. Try Google directly: https://google.com`;
        }

        const safeTitle = escapeHTML(article.title);
        const safeExtract = escapeHTML(article.extract);
        const safeURL = escapeHTML(article.url);

        return `
          <div>${escapeHTML(intro)}</div>
          <div class="search-card">
            <div class="search-title">${safeTitle}</div>
            <div class="search-url">${safeURL}</div>
            <div class="search-snippet">${safeExtract}</div>
          </div>
        `;
      }

      async function generateResponse(prompt) {
        const aiMessage = { role: "ai", content: "" };
        messages.push(aiMessage);
        renderMessages();

        const promptEcho = `You wonder: "${prompt}".`;
        const opener = randomItem(openers);
        const escalation = randomItem(escalations);
        const finisher = randomItem(finishers);

        let thinkingBubble = renderThinking("Repeating your question back to you");
        await wait(randomDelay());
        thinkingBubble.remove();
        await typeText(aiMessage, promptEcho);

        thinkingBubble = renderThinking("Judging the necessity of this");
        await wait(randomDelay());
        thinkingBubble.remove();
        await typeText(aiMessage, "\n\n" + opener);

        thinkingBubble = renderThinking("Checking if Google still exists");
        await wait(randomDelay());
        thinkingBubble.remove();
        await typeText(aiMessage, "\n\n" + escalation);

        thinkingBubble = renderThinking("Searching Wikipedia because apparently that is my job now");
        let article = null;

        try {
          article = await findWikipediaArticle(prompt);
        } catch (error) {
          article = null;
        }

        await wait(randomDelay());
        thinkingBubble.remove();

        const wikiMessage = { role: "ai", content: "", html: true };
        messages.push(wikiMessage);
        await typeHTML(wikiMessage, formatWikipediaPart(article));

        const finalMessage = { role: "ai", content: "" };
        messages.push(finalMessage);
        renderMessages();

        thinkingBubble = renderThinking("Finalizing unnecessary conclusion");
        await wait(randomDelay());
        thinkingBubble.remove();

        const googleLine = `\n\nFor future emergencies involving typing words into a box: https://google.com`;
        await typeText(finalMessage, finisher + googleLine);
      }

      async function handleSend() {
        const prompt = promptInput.value.trim();

        if (!prompt || isGenerating) return;

        isGenerating = true;
        sendBtn.disabled = true;
        sendBtn.textContent = "Sending";

        messages.push({ role: "user", content: prompt });
        promptInput.value = "";
        renderMessages();

        await generateResponse(prompt);

        isGenerating = false;
        sendBtn.disabled = false;
        sendBtn.textContent = "Send";
        promptInput.focus();
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        handleSend();
      });

      promptInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) {
          event.preventDefault();
          handleSend();
        }
      });

      clearBtn.addEventListener("click", () => {
        if (isGenerating) return;
        messages = [];
        renderMessages();
      });
    </script>
